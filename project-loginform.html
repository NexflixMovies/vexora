<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Login Form</title>
    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0f;
    }

    .back-btn {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 9999;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: sans-serif;
      backdrop-filter: blur(8px);
      transition: 0.3s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.22); }

    div.visme_d {
      min-height: 100vh;
      width: 100%;
    }
    </style>
</head>
<body>

<a class="back-btn" href="/">← Portfolio</a>

<div class="visme_d"
  data-title="Workshop Registration Form"
  data-url="7vgogkkw-workshop-registration-form?fullPage=true"
  data-domain="forms"
  data-full-page="true"
  data-min-height="100vh"
  data-form-id="162818">
</div>

<script src="https://static-bundles.visme.co/forms/vismeforms-embed.js"></script>

</body>
</html>
