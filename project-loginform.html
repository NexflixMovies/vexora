<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Login — Vexora</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;min-height:100vh;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,0.15) 0%,transparent 70%);top:-100px;left:-100px;pointer-events:none;}
body::after{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(245,166,35,0.1) 0%,transparent 70%);bottom:-100px;right:-100px;pointer-events:none;}
.back-btn{position:fixed;top:20px;left:20px;z-index:200;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:8px 18px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;transition:0.3s;}
.back-btn:hover{background:rgba(255,255,255,0.15);}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:48px 44px;width:100%;max-width:440px;position:relative;backdrop-filter:blur(20px);}
.card::before{content:'';position:absolute;inset:0;border-radius:24px;padding:1px;background:linear-gradient(135deg,rgba(99,102,241,0.4),transparent,rgba(245,166,35,0.3));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:36px;}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,#F5A623,#e8931a);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:20px;height:20px;}
.logo-text{color:#fff;font-size:20px;font-weight:700;letter-spacing:1px;}
h1{color:#fff;font-size:26px;font-weight:700;margin-bottom:6px;}
.sub{color:rgba(255,255,255,0.45);font-size:14px;margin-bottom:32px;}
.field{margin-bottom:20px;}
label{display:block;color:rgba(255,255,255,0.6);font-size:12px;font-weight:500;letter-spacing:0.5px;margin-bottom:8px;text-transform:uppercase;}
input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;color:#fff;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:0.3s;}
input::placeholder{color:rgba(255,255,255,0.25);}
input:focus{border-color:rgba(99,102,241,0.6);background:rgba(99,102,241,0.06);box-shadow:0 0 0 3px rgba(99,102,241,0.1);}
.forgot{text-align:right;margin-top:-12px;margin-bottom:28px;}
.forgot a{color:rgba(245,166,35,0.8);font-size:12px;text-decoration:none;transition:0.2s;}
.forgot a:hover{color:#F5A623;}
.btn-login{width:100%;padding:15px;background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:0.3s;position:relative;overflow:hidden;}
.btn-login::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);opacity:0;transition:0.3s;}
.btn-login:hover::before{opacity:1;}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(99,102,241,0.4);}
.divider{display:flex;align-items:center;gap:14px;margin:24px 0;color:rgba(255,255,255,0.2);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08);}
.social-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.social-btn{padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:0.3s;}
.social-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.signup{text-align:center;margin-top:28px;color:rgba(255,255,255,0.4);font-size:13px;}
.signup a{color:#F5A623;text-decoration:none;font-weight:500;}
.particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.particle{position:absolute;width:2px;height:2px;background:rgba(99,102,241,0.5);border-radius:50%;animation:float linear infinite;}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{transform:translateY(-100px) rotate(720deg);opacity:0;}}
@media(max-width:480px){.card{padding:36px 24px;margin:20px;}.logo-text{font-size:18px;}h1{font-size:22px;}}
</style>
</head>
<body>
<a class="back-btn" href="/">← Portfolio</a>
<div class="particles" id="particles"></div>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 40 40" fill="none">
        <path d="M8 10 L20 28 L32 10" stroke="#0A1628" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 10 L20 20 L26 10" stroke="#0A1628" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="logo-text">VEXORA</span>
  </div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to your account to continue</p>
  <div class="field">
    <label>Email Address</label>
    <input type="email" placeholder="you@example.com">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" placeholder="••••••••">
  </div>
  <div class="forgot"><a href="#">Forgot password?</a></div>
  <button class="btn-login">Sign In</button>
  <div class="divider">or continue with</div>
  <div class="social-btns">
    <button class="social-btn">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google
    </button>
    <button class="social-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub
    </button>
  </div>
  <div class="signup">Don't have an account? <a href="#">Sign up free</a></div>
</div>
<script>
const p=document.getElementById('particles');
for(let i=0;i<20;i++){
  const dot=document.createElement('div');
  dot.className='particle';
  dot.style.cssText=`left:${Math.random()*100}%;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;width:${1+Math.random()*3}px;height:${1+Math.random()*3}px;background:rgba(${Math.random()>0.5?'99,102,241':'245,166,35'},0.4);`;
  p.appendChild(dot);
}
</script>
</body>
</html>
